<!-- Dentro de tu tag <script type="module"> en servicios.html -->
<script type="module">
    import { obtenerSiguienteNumero, guardarServicio } from './java_servicios.js';

    // Cargar número al iniciar
    async function inicializar() {
        const num = await obtenerSiguienteNumero();
        document.getElementById('num-display').innerText = num;
    }
    inicializar();

    window.guardar = async () => {
        const data = {
            numeroControl: parseInt(document.getElementById('num-display').innerText),
            cliente: document.getElementById('cliente').value,
            tipo: document.getElementById('tipo').value,
            encargado: document.getElementById('encargado').value,
            notas: document.getElementById('notas').value
        };

        const exito = await guardarServicio(data);
        if (exito) {
            alert("Servicio #" + data.numeroControl + " guardado con éxito.");
            inicializar(); // Actualiza el número para el próximo
            document.getElementById('cliente').value = '';
            document.getElementById('notas').value = '';
        }
    };
</script>
